name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Provide firebase_options.dart (dummy config; template values only)
        run: cp lib/firebase_options.template.dart lib/firebase_options.dart
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test

  functions-and-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: npm install -g firebase-tools
      - name: Cloud Functions tests
        working-directory: functions
        run: |
          npm ci
          npm test
      - name: Firestore/Storage rules tests
        working-directory: firestore-tests
        run: |
          npm ci
          npm test
