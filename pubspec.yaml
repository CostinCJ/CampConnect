name: camp_connect
description: "CampConnect - Summer Camp Mobile App for kids and guides"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  cloud_functions: ^5.1.3
  flutter_local_notifications: ^18.0.1
  firebase_crashlytics: ^4.1.3

  # Localization
  flutter_localizations:
    sdk: flutter

  # Maps (Phase 4, added early per spec)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Offline Map Tiles
  flutter_map_tile_caching: ^9.1.3

  # PDF (Phase 5)
  pdf: ^3.11.2
  printing: ^5.14.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  image: ^4.8.0
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  geolocator: ^13.0.2
  flutter_colorpicker: ^1.1.0
  flutter_secure_storage: ^10.3.1
  url_launcher: ^6.3.2
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1
  image_picker_platform_interface: ^2.11.1
  mocktail: ^1.0.5
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2E5339"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
