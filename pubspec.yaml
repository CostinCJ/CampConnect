name: camp_connect
description: "CampConnect - Summer Camp Mobile App for kids and guides"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # Localization
  flutter_localizations:
    sdk: flutter

  # Maps (Phase 4, added early per spec)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Offline Map Tiles
  flutter_map_tile_caching: ^9.1.3

  # PDF (Phase 5)
  pdf: ^3.11.2
  printing: ^5.14.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  permission_handler: ^11.4.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
