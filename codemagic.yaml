workflows:
  ios-sideload-unsigned:
    name: iOS Unsigned (Sideload Testing)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        - campconnect_secrets   # holds MAPTILER_KEY, FIREBASE_OPTIONS_DART_B64
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Restore firebase_options.dart
        script: |
          echo "$FIREBASE_OPTIONS_DART_B64" | base64 --decode > lib/firebase_options.dart
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build unsigned app
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=MAPTILER_KEY=$MAPTILER_KEY
      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r CampConnect-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa

  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CampConnect ASC API Key
    environment:
      groups:
        - campconnect_secrets   # holds MAPTILER_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.campconnect.campConnect
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Apply signing profiles
        script: |
          # Writes /Users/builder/export_options.plist and injects the
          # cloud-generated certificate + provisioning profile into the project.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=MAPTILER_KEY=$MAPTILER_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
