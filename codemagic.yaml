workflows:
  ios-sideload-unsigned:
    name: iOS Unsigned (Sideload Testing)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        - campconnect_secrets   # holds MAPTILER_KEY, FIREBASE_OPTIONS_DART_B64
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Restore firebase_options.dart
        script: |
          echo "FIREBASE_OPTIONS_DART_B64 length: ${#FIREBASE_OPTIONS_DART_B64}"
          if [ -z "$FIREBASE_OPTIONS_DART_B64" ]; then
            echo "ERROR: FIREBASE_OPTIONS_DART_B64 is not set - add it to the campconnect_secrets group in Codemagic" && exit 1
          fi
          echo "$FIREBASE_OPTIONS_DART_B64" | base64 -D > lib/firebase_options.dart
          echo "Decoded file size: $(wc -c < lib/firebase_options.dart) bytes"
          grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart || \
            (echo "ERROR: decoded lib/firebase_options.dart doesn't look valid - re-check the base64 value in Codemagic" && exit 1)
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter iOS config (no codesign)
        script: |
          flutter build ios --release --no-codesign --config-only \
            --dart-define=MAPTILER_KEY=$MAPTILER_KEY
      - name: Archive unsigned app via xcodebuild
        script: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r CampConnect-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa

  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CampConnect ASC API Key
    environment:
      groups:
        - campconnect_secrets   # holds MAPTILER_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.campconnect.campConnect
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate l10n
        script: flutter gen-l10n
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Apply signing profiles
        script: |
          # Writes /Users/builder/export_options.plist and injects the
          # cloud-generated certificate + provisioning profile into the project.
          xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=MAPTILER_KEY=$MAPTILER_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
